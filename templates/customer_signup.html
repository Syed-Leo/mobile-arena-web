<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account | Mobile Arena</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='customer_signup.css') }}">

</head>

<body>

<div class="bubble-bg"></div>

<div class="content">
<div class="glass-card">

<h2 class="title">CREATE ACCOUNT</h2>

<form method="POST">

<input type="text" name="full_name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="text" name="phone" placeholder="Phone Number" required>

<input type="password" name="password" placeholder="Password" required>

<textarea name="address" placeholder="Address" rows="3"></textarea>

<button type="submit">SIGN UP</button>

</form>

<a href="{{ url_for('customer_login') }}">Back to Login</a>

</div>
</div>

<script>
const bg = document.querySelector('.bubble-bg');
for (let i = 0; i < 50; i++) {

const span = document.createElement('span');

const size = Math.random() * 60 + 10;
const left = Math.random() * 100;
const duration = Math.random() * 20 + 10;
const delay = Math.random() * -30;

span.style.width = `${size}px`;
span.style.height = `${size}px`;
span.style.left = `${left}%`;
span.style.animationDuration = `${duration}s`;
span.style.animationDelay = `${delay}s`;

bg.appendChild(span);

}
</script>

</body>
</html>
