<!DOCTYPE html>
<html>
<head>

<title>Delete Customer</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='admin_delete_customer.css') }}">

</head>

<body>

<div class="bubble-bg"></div>

<div class="container">
<div class="card">

<h2>🗑 Delete Customer</h2>

<form method="POST" class="form">

<select name="customer_id" required>

<option value="">Select Customer</option>

{% for customer in customers %}
<option value="{{ customer[0] }}">
{{ customer[1] }} (ID: {{ customer[0] }})
</option>
{% endfor %}

</select>

<button type="submit">Delete Customer</button>

</form>

{% if msg %}
<p class="msg">{{ msg }}</p>
{% endif %}

<a href="{{ url_for('admin_dashboard') }}" class="back-btn">
⬅ Back to Dashboard
</a>

</div>
</div>

<script>
const bg = document.querySelector('.bubble-bg');

for (let i = 0; i < 50; i++) {
  const span = document.createElement('span');

  const size = Math.random() * 60 + 10;
  const left = Math.random() * 100;
  const duration = Math.random() * 20 + 10;
  const delay = Math.random() * -30;

  span.style.width = size + "px";
  span.style.height = size + "px";
  span.style.left = left + "%";
  span.style.animationDuration = duration + "s";
  span.style.animationDelay = delay + "s";

  bg.appendChild(span);
}
</script>

</body>
</html>
