<!DOCTYPE html>
<html>
<head>

<title>Manage Orders</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='admin_orders.css') }}">

</head>

<body>

<div class="bubble-bg"></div>

<div class="container">

<h2>📦 Manage Orders</h2>

<div class="table-card">

<table>

<tr>
<th>Order ID</th>
<th>Customer Name</th>
<th>Total Amount</th>
<th>Status</th>
<th>Update Status</th>
</tr>

{% for order in orders %}
<tr>

<td>#{{ order.order_id }}</td>

<td>{{ order.full_name }}</td>

<td class="price">₹{{ order.total_amount }}</td>

<td>
<span class="status {{ order.status|lower }}">
{{ order.status }}
</span>
</td>

<td>

<form method="POST" action="/admin/update_order/{{ order.order_id }}" class="update-form">

<select name="status">

<option value="PENDING">PENDING</option>
<option value="SHIPPED">SHIPPED</option>
<option value="DELIVERED">DELIVERED</option>
<option value="CANCELLED">CANCELLED</option>

</select>

<button type="submit">Update</button>

</form>

</td>

</tr>
{% endfor %}

</table>

</div>

<div class="bottom-buttons">

<a href="/admin/dashboard" class="back-btn">
⬅ Back to Dashboard
</a>
<br>
<a href="/logout" class="logout-btn">
Logout
</a>

</div>

</div>

</body>

<script>
const bg = document.querySelector('.bubble-bg');

for (let i = 0; i < 50; i++) {
  const span = document.createElement('span');

  const size = Math.random() * 60 + 10;
  const left = Math.random() * 100;
  const duration = Math.random() * 20 + 10;
  const delay = Math.random() * -30;

  span.style.width = size + "px";
  span.style.height = size + "px";
  span.style.left = left + "%";
  span.style.animationDuration = duration + "s";
  span.style.animationDelay = delay + "s";

  bg.appendChild(span);
}
</script>

</html>
