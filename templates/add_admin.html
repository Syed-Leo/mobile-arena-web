<!DOCTYPE html>
<html>
<head>
<title>Add Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='add_admin.css') }}">

</head>

<body>

<div class="bubble-bg"></div>

<div class="container">
<div class="card">

<h2>Add New Admin</h2>

<form method="POST">

<label>Admin Username</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Password</label>
<input type="password" name="password" required>

<button type="submit">Add Admin</button>

</form>

<a href="{{ url_for('admin_dashboard') }}">Back</a>

</div>
</div>

<script>
const bg = document.querySelector('.bubble-bg');

for (let i = 0; i < 50; i++) {
    const span = document.createElement('span');

    const size = Math.random() * 60 + 10;
    const left = Math.random() * 100;
    const duration = Math.random() * 20 + 10;
    const delay = Math.random() * -30;

    span.style.width = size + "px";
    span.style.height = size + "px";
    span.style.left = left + "%";
    span.style.animationDuration = duration + "s";
    span.style.animationDelay = delay + "s";

    bg.appendChild(span);
}
</script>

</body>
</html>
