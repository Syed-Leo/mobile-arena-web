<!DOCTYPE html>
<html>
<head>

<title>Add Customer</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='admin_add_customer.css') }}">

</head>

<body>

<div class="bubble-bg"></div>

<div class="container">
<div class="card">

<h2>➕ Add New Customer</h2>

<form method="POST" class="form">

<input name="full_name" placeholder="Full Name" required value="{{ full_name or '' }}">

<input name="email" type="email" placeholder="Email" required value="{{ email or '' }}">

<input name="phone" placeholder="Phone" required value="{{ phone or '' }}">

<input name="password" type="password" placeholder="Password" required value="{{ password or '' }}">

<textarea name="address" placeholder="Address" required>{{ address or '' }}</textarea>

<button type="submit">Add Customer</button>

</form>

{% if msg %}
<p class="{{ msg_type }}">{{ msg }}</p>
{% endif %}

<a href="{{ url_for('admin_dashboard') }}" class="back-btn">
⬅ Back to Dashboard
</a>

</div>
</div>

<script>
const bg = document.querySelector('.bubble-bg');

for (let i = 0; i < 50; i++) {
  const span = document.createElement('span');

  const size = Math.random() * 60 + 10;
  const left = Math.random() * 100;
  const duration = Math.random() * 20 + 10;
  const delay = Math.random() * -30;

  span.style.width = size + "px";
  span.style.height = size + "px";
  span.style.left = left + "%";
  span.style.animationDuration = duration + "s";
  span.style.animationDelay = delay + "s";

  bg.appendChild(span);
}
</script>

</body>
</html>
