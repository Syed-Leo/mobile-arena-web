<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Login | Mobile Arena</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='customer_login.css') }}">
</head>
<body>

  <div class="bubble-bg"></div>

  <div class="content">
    <div class="glass-card">
      <h2 class="title">Customer Login</h2>

      <form method="post">
        <input name="userid" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" class="btn">Login</button>
      </form>

      <p class="signup-link">
        Don't have an account? 
        <a href="{{ url_for('customer_signup') }}">Sign Up</a>
      </p>

      <a href="{{ url_for('home') }}" class="logout-link">Back to Home</a>

      {% if error %}
        <div class="error-msg">{{ error }}</div>
      {% endif %}
    </div>
  </div>

  <script>
    const bg = document.querySelector('.bubble-bg');
    for (let i = 0; i < 50; i++) {
      const span = document.createElement('span');
      const size = Math.random() * 60 + 10;
      const left = Math.random() * 100;
      const duration = Math.random() * 20 + 10;
      const delay = Math.random() * -30;

      span.style.width = `${size}px`;
      span.style.height = `${size}px`;
      span.style.left = `${left}%`;
      span.style.animationDuration = `${duration}s`;
      span.style.animationDelay = `${delay}s`;

      bg.appendChild(span);
    }
  </script>

</body>
</html>
