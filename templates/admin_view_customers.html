<!DOCTYPE html>
<html>
<head>

<title>View Customers</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='admin_view_customer.css') }}">

</head>

<body>

<div class="bubble-bg"></div>

<div class="container">

<h2>👥 All Customers</h2>

<div class="table-card">

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Address</th>
</tr>

{% for row in customers %}
<tr>

<td>#{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>

</tr>
{% endfor %}

</table>

</div>

<div class="bottom-btn">
<a href="{{ url_for('admin_dashboard') }}" class="back-btn">
⬅ Back to Dashboard
</a>
</div>

</div>

<script>
const bg = document.querySelector('.bubble-bg');

for (let i = 0; i < 50; i++) {
  const span = document.createElement('span');

  const size = Math.random() * 60 + 10;
  const left = Math.random() * 100;
  const duration = Math.random() * 20 + 10;
  const delay = Math.random() * -30;

  span.style.width = size + "px";
  span.style.height = size + "px";
  span.style.left = left + "%";
  span.style.animationDuration = duration + "s";
  span.style.animationDelay = delay + "s";

  bg.appendChild(span);
}
</script>

</body>
</html>
