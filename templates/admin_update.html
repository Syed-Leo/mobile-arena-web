<!DOCTYPE html>
<html>
<head>

<title>Update Phone Price</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='admin_update.css') }}">

</head>

<body>

<div class="bubble-bg"></div>

<div class="container">
<div class="card">

<h2>💰 Update Phone Price</h2>

<form method="POST" class="form">

<!-- BRAND DROPDOWN -->
<select name="brand_id" id="brand" required>

<option value="">Select Brand</option>

{% for brand in brands %}
<option value="{{ brand[0] }}">{{ brand[1] }}</option>
{% endfor %}

</select>


<!-- PHONE DROPDOWN -->
<select name="product_id" id="phones" required>
<option value="">Select Phone</option>
</select>


<input type="number" name="price" placeholder="New Price" required>


<button type="submit">Update Price</button>

</form>

{% if msg %}
<p class="msg">{{ msg }}</p>
{% endif %}

<a href="{{ url_for('admin_dashboard') }}" class="back-btn">
⬅ Back to Dashboard
</a>

</div>
</div>

<script>

document.getElementById("brand").addEventListener("change", function(){

let brand_id = this.value;

fetch("/get_products/" + brand_id)

.then(response => response.json())

.then(data => {

let phoneDropdown = document.getElementById("phones");

phoneDropdown.innerHTML = '<option value="">Select Phone</option>';

data.forEach(product => {

let option = document.createElement("option");

option.value = product.product_id;
option.textContent = product.product_name;

phoneDropdown.appendChild(option);

});

})

.catch(error => console.log(error));

});

const bg = document.querySelector('.bubble-bg');

for (let i = 0; i < 50; i++) {
  const span = document.createElement('span');

  const size = Math.random() * 60 + 10;
  const left = Math.random() * 100;
  const duration = Math.random() * 20 + 10;
  const delay = Math.random() * -30;

  span.style.width = size + "px";
  span.style.height = size + "px";
  span.style.left = left + "%";
  span.style.animationDuration = duration + "s";
  span.style.animationDelay = delay + "s";

  bg.appendChild(span);
}
</script>

</body>
</html>
