<!DOCTYPE html>
<html>
<head>

<title>Add Phone</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='admin_add.css') }}">

</head>

<body>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="flash-popup {{ category }}">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

<div class="bubble-bg"></div>

<div class="container">

<div class="card">

<h2>📱 Add New Phone</h2>

<form method="post">

<!-- BASIC INFO -->
<h3 class="section-title">Basic Info</h3>

<div class="form-grid">

<input name="product_name" placeholder="Phone Name" required>

<input name="price" placeholder="Price" required>

<textarea name="description" placeholder="Description"></textarea>

<select name="brand_id">
<option value="">Select Brand</option>
<option value="1">Apple</option>
<option value="2">Samsung</option>
<option value="3">OnePlus</option>
<option value="4">Nothing</option>
</select>

</div>

<!-- SPECIFICATIONS -->
<h3 class="section-title">Specifications</h3>

<div class="form-grid">

<input name="ram" placeholder="RAM (8GB)">

<input name="storage" placeholder="Storage (128GB)">

<input name="battery" placeholder="Battery (5000mAh)">

<input name="os" placeholder="Operating System">

<input name="network" placeholder="Network (5G)">

<input name="front_camera" placeholder="Front Camera">

<input name="rear_camera" placeholder="Rear Camera">

</div>

<button type="submit" class="submit-btn">Add Phone</button>

</form>

{% if msg %}
<p class="msg">{{ msg }}</p>
{% endif %}

<a href="/admin/dashboard" class="back-btn">⬅ Back to Dashboard</a>

</div>
</div>

<script>
const bg = document.querySelector('.bubble-bg');

for (let i = 0; i < 50; i++) {
  const span = document.createElement('span');

  const size = Math.random() * 60 + 10;
  const left = Math.random() * 100;
  const duration = Math.random() * 20 + 10;
  const delay = Math.random() * -30;

  span.style.width = size + "px";
  span.style.height = size + "px";
  span.style.left = left + "%";
  span.style.animationDuration = duration + "s";
  span.style.animationDelay = delay + "s";

  bg.appendChild(span);
}
</script>

</body>
</html>
